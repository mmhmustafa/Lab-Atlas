# AtlasLab - doas.conf for the atlaslab/firewall image.
#
# Deliberately one exact rule, not a general "atlas can run iptables as
# root" grant: `doas.conf`'s `args` clause requires an *exact* argument
# match (see doas.conf(5)), so this permits precisely the read-only
# rule-listing command fwsh's "show firewall rules" runs - nothing that
# adds, deletes, or flushes rules, and nothing else atlas could invoke
# manually to escalate further. fwsh (the atlas login shell) is the
# only caller; there is no interactive shell this rule is reachable
# from otherwise.
permit nopass atlas as root cmd /usr/sbin/iptables args -L FORWARD -n -v --line-numbers
