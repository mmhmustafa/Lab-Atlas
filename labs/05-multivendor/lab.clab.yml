name: atlas-05-multivendor

topology:
  defaults:
    kind: linux
    image: atlaslab/frr:latest
    cap-add:
      - NET_ADMIN
      - NET_RAW
      - SYS_ADMIN
    sysctls:
      net.ipv4.ip_forward: 1
      net.ipv4.conf.all.rp_filter: 0
      net.ipv4.conf.default.rp_filter: 0

  nodes:
    vendor-a:
      binds:
        - ../../configs/05-multivendor/vendor-a/daemons:/etc/frr/daemons
        - ../../configs/05-multivendor/vendor-a/frr.conf:/etc/frr/frr.conf
        - ../../configs/05-multivendor/vendor-a/vtysh.conf:/etc/frr/vtysh.conf
    vendor-b:
      binds:
        - ../../configs/05-multivendor/vendor-b/daemons:/etc/frr/daemons
        - ../../configs/05-multivendor/vendor-b/frr.conf:/etc/frr/frr.conf
        - ../../configs/05-multivendor/vendor-b/vtysh.conf:/etc/frr/vtysh.conf
    vendor-c:
      binds:
        - ../../configs/05-multivendor/vendor-c/daemons:/etc/frr/daemons
        - ../../configs/05-multivendor/vendor-c/frr.conf:/etc/frr/frr.conf
        - ../../configs/05-multivendor/vendor-c/vtysh.conf:/etc/frr/vtysh.conf

  links:
    - endpoints: ["vendor-a:eth1", "vendor-b:eth1"]
    - endpoints: ["vendor-b:eth2", "vendor-c:eth1"]
    - endpoints: ["vendor-a:eth2", "vendor-c:eth2"]
