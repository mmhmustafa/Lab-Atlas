name: atlas-basic

topology:
  defaults:
    kind: linux
    image: atlaslab/frr:latest
    cap-add:
      - NET_ADMIN
      - NET_RAW
      - SYS_ADMIN
    sysctls:
      net.ipv4.ip_forward: 1
      net.ipv4.conf.all.rp_filter: 0
      net.ipv4.conf.default.rp_filter: 0

  nodes:
    r1:
      binds:
        - ../../configs/01-basic/r1/daemons:/etc/frr/daemons
        - ../../configs/01-basic/r1/frr.conf:/etc/frr/frr.conf
        - ../../configs/01-basic/r1/vtysh.conf:/etc/frr/vtysh.conf

    r2:
      binds:
        - ../../configs/01-basic/r2/daemons:/etc/frr/daemons
        - ../../configs/01-basic/r2/frr.conf:/etc/frr/frr.conf
        - ../../configs/01-basic/r2/vtysh.conf:/etc/frr/vtysh.conf

  links:
    - endpoints: ["r1:eth1", "r2:eth1"]
