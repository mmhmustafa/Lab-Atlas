---
# ==============================================================================
# AtlasLab - inventory/devices.yaml
#
# Single source of truth for the 06-atlas-demo 20-router enterprise topology.
# Consumed by scripts/generate-configs.py to render:
#   - configs/06-atlas-demo/<node>/{daemons,frr.conf,vtysh.conf}
#   - labs/06-atlas-demo/lab.clab.yml
#
# Addressing plan (see docs/addressing.md for full detail):
#   10.255.0.0/24   Atlas campus router loopbacks   (edge/core/dist/access/server-edge)
#   10.255.1.0/24   Branch site loopbacks
#   10.10.0.0/16    Internal Atlas point-to-point links (/30 per link)
#   172.16.0.0/20   Campus site/server LAN stubs (access1-4, server-edge1-2) - secondary on loopback
#   172.16.100.0/22 Branch site LAN stubs (branch1-4) - secondary on loopback, NOT advertised to ISPs
#   192.0.2.0/24    ISP loopbacks + ISP<->Edge transit links (TEST-NET-1)
#
# AS plan:
#   65000  Atlas campus (edge1, edge2, core1, core2 run iBGP full mesh)
#   64500  isp1 (upstream provider 1)
#   64501  isp2 (upstream provider 2)
#   65001-65004  branch1-4 (each branch is its own eBGP-speaking site)
#
# dist/access/server-edge routers are OSPF-only (no BGP) - they receive
# internet/branch reachability via OSPF external routes redistributed at
# edge1/edge2. This models a typical enterprise where BGP is confined to
# the WAN edge and the campus core/distribution/access layers are a pure
# IGP domain - a deliberate, realistic design choice, not a limitation.
# ==============================================================================

asn:
  atlas: 65000
  isp1: 64500
  isp2: 64501
  branch1: 65001
  branch2: 65002
  branch3: 65003
  branch4: 65004

ospf:
  area: 0.0.0.0
  process_tag: ATLAS

devices:
  # ---------------------------------------------------------------- ISPs ----
  isp1:
    role: isp
    asn: 64500
    loopback: 192.0.2.1/32
    test_prefix: 198.51.100.0/24     # simulated "internet" block, redistributed from a Null0 static
    bgp_group: none

  isp2:
    role: isp
    asn: 64501
    loopback: 192.0.2.2/32
    test_prefix: 203.0.113.0/24
    bgp_group: none

  # --------------------------------------------------------------- Edge -----
  edge1:
    role: edge
    asn: 65000
    loopback: 10.255.0.1/32
    ospf: true

  edge2:
    role: edge
    asn: 65000
    loopback: 10.255.0.2/32
    ospf: true

  # --------------------------------------------------------------- Core -----
  core1:
    role: core
    asn: 65000
    loopback: 10.255.0.11/32
    ospf: true

  core2:
    role: core
    asn: 65000
    loopback: 10.255.0.12/32
    ospf: true

  # ------------------------------------------------------------- Distrib ----
  dist1:
    role: dist
    asn: null
    loopback: 10.255.0.21/32
    ospf: true

  dist2:
    role: dist
    asn: null
    loopback: 10.255.0.22/32
    ospf: true

  dist3:
    role: dist
    asn: null
    loopback: 10.255.0.23/32
    ospf: true

  dist4:
    role: dist
    asn: null
    loopback: 10.255.0.24/32
    ospf: true

  # -------------------------------------------------------------- Access ----
  access1:
    role: access
    asn: null
    loopback: 10.255.0.31/32
    lan: 172.16.10.0/24
    ospf: true

  access2:
    role: access
    asn: null
    loopback: 10.255.0.32/32
    lan: 172.16.11.0/24
    ospf: true

  access3:
    role: access
    asn: null
    loopback: 10.255.0.33/32
    lan: 172.16.12.0/24
    ospf: true

  access4:
    role: access
    asn: null
    loopback: 10.255.0.34/32
    lan: 172.16.13.0/24
    ospf: true

  # --------------------------------------------------------- Server Edge ----
  server-edge1:
    role: server-edge
    asn: null
    loopback: 10.255.0.41/32
    lan: 172.16.14.0/24
    ospf: true

  server-edge2:
    role: server-edge
    asn: null
    loopback: 10.255.0.42/32
    lan: 172.16.15.0/24
    ospf: true

  # -------------------------------------------------------------- Branch ----
  # Branch LANs are 172.16.100.0/22 (100-103) - deliberately NOT covered by
  # the PL-ATLAS-LANS (172.16.0.0/20) prefix-list used to filter routes
  # advertised to the ISPs, so branch site LANs stay private WAN-only and
  # are never leaked to the internet. See docs/routing.md.
  branch1:
    role: branch
    asn: 65001
    loopback: 10.255.1.1/32
    lan: 172.16.100.0/24
    ospf: false

  branch2:
    role: branch
    asn: 65002
    loopback: 10.255.1.2/32
    lan: 172.16.101.0/24
    ospf: false

  branch3:
    role: branch
    asn: 65003
    loopback: 10.255.1.3/32
    lan: 172.16.102.0/24
    ospf: false

  branch4:
    role: branch
    asn: 65004
    loopback: 10.255.1.4/32
    lan: 172.16.103.0/24
    ospf: false

# ==============================================================================
# Links: single source of truth for every point-to-point subnet in the lab.
# The generator assigns the lower host address in each subnet to `a` and the
# upper host address to `b`, and auto-numbers interfaces (eth1, eth2, ...) in
# the order links are declared per-device.
#
# group values drive protocol behavior in the generator:
#   isp-edge      -> eBGP (a=isp, b=edge), no OSPF
#   edge-branch   -> eBGP (a=edge, b=branch), no OSPF
#   everything else with ospf:true -> OSPF area 0 on both ends
# ==============================================================================
links:
  # --- ISP <-> Edge (eBGP, TEST-NET-1 transit) ---
  - { a: isp1, b: edge1, subnet: 192.0.2.8/30,   group: isp-edge }
  - { a: isp1, b: edge2, subnet: 192.0.2.12/30,  group: isp-edge }
  - { a: isp2, b: edge1, subnet: 192.0.2.16/30,  group: isp-edge }
  - { a: isp2, b: edge2, subnet: 192.0.2.20/30,  group: isp-edge }

  # --- Edge <-> Edge (OSPF + iBGP peering link) ---
  - { a: edge1, b: edge2, subnet: 10.10.1.0/30,  group: edge-edge, ospf: true }

  # --- Edge <-> Core (OSPF) ---
  - { a: edge1, b: core1, subnet: 10.10.2.0/30,  group: edge-core, ospf: true }
  - { a: edge1, b: core2, subnet: 10.10.2.4/30,  group: edge-core, ospf: true }
  - { a: edge2, b: core1, subnet: 10.10.2.8/30,  group: edge-core, ospf: true }
  - { a: edge2, b: core2, subnet: 10.10.2.12/30, group: edge-core, ospf: true }

  # --- Core <-> Core (OSPF) ---
  - { a: core1, b: core2, subnet: 10.10.3.0/30,  group: core-core, ospf: true }

  # --- Core <-> Distribution (OSPF, dual-homed) ---
  - { a: core1, b: dist1, subnet: 10.10.4.0/30,  group: core-dist, ospf: true }
  - { a: core2, b: dist1, subnet: 10.10.4.4/30,  group: core-dist, ospf: true }
  - { a: core1, b: dist2, subnet: 10.10.4.8/30,  group: core-dist, ospf: true }
  - { a: core2, b: dist2, subnet: 10.10.4.12/30, group: core-dist, ospf: true }
  - { a: core1, b: dist3, subnet: 10.10.4.16/30, group: core-dist, ospf: true }
  - { a: core2, b: dist3, subnet: 10.10.4.20/30, group: core-dist, ospf: true }
  - { a: core1, b: dist4, subnet: 10.10.4.24/30, group: core-dist, ospf: true }
  - { a: core2, b: dist4, subnet: 10.10.4.28/30, group: core-dist, ospf: true }

  # --- Distribution <-> Distribution (intra-pod redundancy, OSPF) ---
  - { a: dist1, b: dist2, subnet: 10.10.5.0/30,  group: dist-dist, ospf: true }
  - { a: dist3, b: dist4, subnet: 10.10.5.4/30,  group: dist-dist, ospf: true }

  # --- Distribution <-> Access (OSPF, dual-homed) ---
  - { a: dist1, b: access1, subnet: 10.10.6.0/30,  group: dist-access, ospf: true }
  - { a: dist2, b: access1, subnet: 10.10.6.4/30,  group: dist-access, ospf: true }
  - { a: dist1, b: access2, subnet: 10.10.6.8/30,  group: dist-access, ospf: true }
  - { a: dist2, b: access2, subnet: 10.10.6.12/30, group: dist-access, ospf: true }
  - { a: dist3, b: access3, subnet: 10.10.6.16/30, group: dist-access, ospf: true }
  - { a: dist4, b: access3, subnet: 10.10.6.20/30, group: dist-access, ospf: true }
  - { a: dist3, b: access4, subnet: 10.10.6.24/30, group: dist-access, ospf: true }
  - { a: dist4, b: access4, subnet: 10.10.6.28/30, group: dist-access, ospf: true }

  # --- Core <-> Server-Edge (OSPF, dual-homed data center edge) ---
  - { a: core1, b: server-edge1, subnet: 10.10.7.0/30,  group: core-serveredge, ospf: true }
  - { a: core2, b: server-edge1, subnet: 10.10.7.4/30,  group: core-serveredge, ospf: true }
  - { a: core1, b: server-edge2, subnet: 10.10.7.8/30,  group: core-serveredge, ospf: true }
  - { a: core2, b: server-edge2, subnet: 10.10.7.12/30, group: core-serveredge, ospf: true }

  # --- Server-Edge <-> Server-Edge (redundancy, OSPF) ---
  - { a: server-edge1, b: server-edge2, subnet: 10.10.8.0/30, group: serveredge-serveredge, ospf: true }

  # --- Edge <-> Branch (eBGP, dual-homed WAN) ---
  - { a: edge1, b: branch1, subnet: 10.10.9.0/30,   group: edge-branch }
  - { a: edge2, b: branch1, subnet: 10.10.9.4/30,   group: edge-branch }
  - { a: edge1, b: branch2, subnet: 10.10.9.8/30,   group: edge-branch }
  - { a: edge2, b: branch2, subnet: 10.10.9.12/30,  group: edge-branch }
  - { a: edge1, b: branch3, subnet: 10.10.9.16/30,  group: edge-branch }
  - { a: edge2, b: branch3, subnet: 10.10.9.20/30,  group: edge-branch }
  - { a: edge1, b: branch4, subnet: 10.10.9.24/30,  group: edge-branch }
  - { a: edge2, b: branch4, subnet: 10.10.9.28/30,  group: edge-branch }

# ==============================================================================
# iBGP full mesh (AS 65000) - loopback-to-loopback, reachable via OSPF.
# Confined to the four WAN-edge/core routers; dist/access/server-edge stay
# BGP-free and get external reachability via OSPF redistribution at edge1/edge2.
# ==============================================================================
ibgp_mesh:
  - [edge1, edge2]
  - [edge1, core1]
  - [edge1, core2]
  - [edge2, core1]
  - [edge2, core2]
  - [core1, core2]
