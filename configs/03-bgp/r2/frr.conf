! ============================================================================
! AtlasLab - lab 03-bgp - r2 (AS 65012, transit hub between r1 and r3)
! ============================================================================
frr version 10.0
frr defaults traditional
hostname r2
log file /var/log/frr/frr.log informational
log timestamp precision 3
service integrated-vtysh-config
!
interface lo
 description LOOPBACK-r2
 ip address 10.3.255.2/32
!
interface eth1
 description LINK-TO-r1-EBGP
 ip address 10.3.12.2/30
!
interface eth2
 description LINK-TO-r3-EBGP
 ip address 10.3.23.1/30
!
router bgp 65012
 no bgp ebgp-requires-policy
 no bgp network import-check
 bgp router-id 10.3.255.2
 neighbor 10.3.12.1 remote-as 65011
 neighbor 10.3.12.1 description EBGP-r1
 neighbor 10.3.23.2 remote-as 65013
 neighbor 10.3.23.2 description EBGP-r3
 !
 address-family ipv4 unicast
  network 10.3.255.2/32
 exit-address-family
exit
!
line vty
!
