! ============================================================================
! AtlasLab - lab 04-enterprise - isp1 (AS 64600)
! ============================================================================
frr version 10.0
frr defaults traditional
hostname isp1
log file /var/log/frr/frr.log informational
log timestamp precision 3
service integrated-vtysh-config
!
interface lo
 description LOOPBACK-isp1
 ip address 192.0.2.50/32
!
interface eth1
 description LINK-TO-edge1-ISP-EDGE
 ip address 192.0.2.65/30
!
interface eth2
 description LINK-TO-edge2-ISP-EDGE
 ip address 192.0.2.69/30
!
router bgp 64600
 no bgp ebgp-requires-policy
 no bgp network import-check
 bgp router-id 192.0.2.50
 neighbor 192.0.2.66 remote-as 65100
 neighbor 192.0.2.66 description EBGP-edge1
 neighbor 192.0.2.70 remote-as 65100
 neighbor 192.0.2.70 description EBGP-edge2
 !
 address-family ipv4 unicast
  network 192.0.2.50/32
  redistribute static
 exit-address-family
exit
!
ip route 203.0.113.128/25 Null0
!
line vty
!
