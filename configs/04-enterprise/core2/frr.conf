! ============================================================================
! AtlasLab - lab 04-enterprise - core2 (AS 65100)
! ============================================================================
frr version 10.0
frr defaults traditional
hostname core2
log file /var/log/frr/frr.log informational
log timestamp precision 3
service integrated-vtysh-config
!
interface lo
 description LOOPBACK-core2
 ip address 10.4.255.12/32
!
interface eth1
 description LINK-TO-edge1-EDGE-CORE
 ip address 10.4.2.6/30
!
interface eth2
 description LINK-TO-edge2-EDGE-CORE
 ip address 10.4.2.14/30
!
interface eth3
 description LINK-TO-core1-CORE-CORE
 ip address 10.4.3.2/30
!
interface eth4
 description LINK-TO-dist1-CORE-DIST
 ip address 10.4.4.5/30
!
interface eth5
 description LINK-TO-dist2-CORE-DIST
 ip address 10.4.4.13/30
!
router ospf
 ospf router-id 10.4.255.12
 passive-interface default
 no passive-interface eth1
 no passive-interface eth2
 no passive-interface eth3
 no passive-interface eth4
 no passive-interface eth5
 network 10.4.255.12/32 area 0.0.0.0
 network 10.4.2.4/30 area 0.0.0.0
 network 10.4.2.12/30 area 0.0.0.0
 network 10.4.3.0/30 area 0.0.0.0
 network 10.4.4.4/30 area 0.0.0.0
 network 10.4.4.12/30 area 0.0.0.0
exit
!
router bgp 65100
 no bgp ebgp-requires-policy
 no bgp network import-check
 bgp router-id 10.4.255.12
 neighbor 10.4.255.1 remote-as 65100
 neighbor 10.4.255.1 description IBGP-edge1
 neighbor 10.4.255.1 update-source lo
 neighbor 10.4.255.2 remote-as 65100
 neighbor 10.4.255.2 description IBGP-edge2
 neighbor 10.4.255.2 update-source lo
 neighbor 10.4.255.11 remote-as 65100
 neighbor 10.4.255.11 description IBGP-core1
 neighbor 10.4.255.11 update-source lo
 !
 address-family ipv4 unicast
  neighbor 10.4.255.1 next-hop-self
  neighbor 10.4.255.2 next-hop-self
  neighbor 10.4.255.11 next-hop-self
  maximum-paths ibgp 4
 exit-address-family
exit
!
line vty
!
