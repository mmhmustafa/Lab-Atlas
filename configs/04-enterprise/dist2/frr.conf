! ============================================================================
! AtlasLab - lab 04-enterprise - dist2
! ============================================================================
frr version 10.0
frr defaults traditional
hostname dist2
log file /var/log/frr/frr.log informational
log timestamp precision 3
service integrated-vtysh-config
!
interface lo
 description LOOPBACK-dist2
 ip address 10.4.255.22/32
!
interface eth1
 description LINK-TO-core1-CORE-DIST
 ip address 10.4.4.10/30
!
interface eth2
 description LINK-TO-core2-CORE-DIST
 ip address 10.4.4.14/30
!
interface eth3
 description LINK-TO-access1-DIST-ACCESS
 ip address 10.4.5.5/30
!
interface eth4
 description LINK-TO-access2-DIST-ACCESS
 ip address 10.4.5.13/30
!
router ospf
 ospf router-id 10.4.255.22
 passive-interface default
 no passive-interface eth1
 no passive-interface eth2
 no passive-interface eth3
 no passive-interface eth4
 network 10.4.255.22/32 area 0.0.0.0
 network 10.4.4.8/30 area 0.0.0.0
 network 10.4.4.12/30 area 0.0.0.0
 network 10.4.5.4/30 area 0.0.0.0
 network 10.4.5.12/30 area 0.0.0.0
exit
!
line vty
!
