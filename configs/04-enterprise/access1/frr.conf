! ============================================================================
! AtlasLab - lab 04-enterprise - access1
! ============================================================================
frr version 10.0
frr defaults traditional
hostname access1
log file /var/log/frr/frr.log informational
log timestamp precision 3
service integrated-vtysh-config
!
interface lo
 description LOOPBACK-access1
 ip address 10.4.255.31/32
 ip address 172.16.210.1/24
!
interface eth1
 description LINK-TO-dist1-DIST-ACCESS
 ip address 10.4.5.2/30
!
interface eth2
 description LINK-TO-dist2-DIST-ACCESS
 ip address 10.4.5.6/30
!
router ospf
 ospf router-id 10.4.255.31
 passive-interface default
 no passive-interface eth1
 no passive-interface eth2
 network 10.4.255.31/32 area 0.0.0.0
 network 172.16.210.0/24 area 0.0.0.0
 network 10.4.5.0/30 area 0.0.0.0
 network 10.4.5.4/30 area 0.0.0.0
exit
!
line vty
!
