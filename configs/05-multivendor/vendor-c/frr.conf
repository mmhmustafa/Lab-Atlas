! ============================================================================
! AtlasLab - lab 05-multivendor - vendor-c (AS 65023)
! ============================================================================
frr version 10.0
frr defaults traditional
hostname vendor-c
log file /var/log/frr/frr.log informational
log timestamp precision 3
service integrated-vtysh-config
!
interface lo
 description LOOPBACK-vendor-c
 ip address 10.5.255.3/32
!
interface eth1
 description LINK-TO-vendor-b-EBGP
 ip address 10.5.23.2/30
!
interface eth2
 description LINK-TO-vendor-a-EBGP
 ip address 10.5.13.2/30
!
router bgp 65023
 no bgp ebgp-requires-policy
 no bgp network import-check
 bgp router-id 10.5.255.3
 neighbor 10.5.23.1 remote-as 65022
 neighbor 10.5.23.1 description EBGP-vendor-b
 neighbor 10.5.13.1 remote-as 65021
 neighbor 10.5.13.1 description EBGP-vendor-a
 !
 address-family ipv4 unicast
  network 10.5.255.3/32
 exit-address-family
exit
!
line vty
!
