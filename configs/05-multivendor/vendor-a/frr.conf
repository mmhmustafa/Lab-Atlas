! ============================================================================
! AtlasLab - lab 05-multivendor - vendor-a (AS 65021)
! Stands in for a "Vendor A" platform in an interop mesh. See
! labs/05-multivendor/README.md for the honesty note on image availability.
! ============================================================================
frr version 10.0
frr defaults traditional
hostname vendor-a
log file /var/log/frr/frr.log informational
log timestamp precision 3
service integrated-vtysh-config
!
interface lo
 description LOOPBACK-vendor-a
 ip address 10.5.255.1/32
!
interface eth1
 description LINK-TO-vendor-b-EBGP
 ip address 10.5.12.1/30
!
interface eth2
 description LINK-TO-vendor-c-EBGP
 ip address 10.5.13.1/30
!
router bgp 65021
 no bgp ebgp-requires-policy
 no bgp network import-check
 bgp router-id 10.5.255.1
 neighbor 10.5.12.2 remote-as 65022
 neighbor 10.5.12.2 description EBGP-vendor-b
 neighbor 10.5.13.2 remote-as 65023
 neighbor 10.5.13.2 description EBGP-vendor-c
 !
 address-family ipv4 unicast
  network 10.5.255.1/32
 exit-address-family
exit
!
line vty
!
