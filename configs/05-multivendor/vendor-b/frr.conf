! ============================================================================
! AtlasLab - lab 05-multivendor - vendor-b (AS 65022)
! ============================================================================
frr version 10.0
frr defaults traditional
hostname vendor-b
log file /var/log/frr/frr.log informational
log timestamp precision 3
service integrated-vtysh-config
!
interface lo
 description LOOPBACK-vendor-b
 ip address 10.5.255.2/32
!
interface eth1
 description LINK-TO-vendor-a-EBGP
 ip address 10.5.12.2/30
!
interface eth2
 description LINK-TO-vendor-c-EBGP
 ip address 10.5.23.1/30
!
router bgp 65022
 no bgp ebgp-requires-policy
 no bgp network import-check
 bgp router-id 10.5.255.2
 neighbor 10.5.12.1 remote-as 65021
 neighbor 10.5.12.1 description EBGP-vendor-a
 neighbor 10.5.23.2 remote-as 65023
 neighbor 10.5.23.2 description EBGP-vendor-c
 !
 address-family ipv4 unicast
  network 10.5.255.2/32
 exit-address-family
exit
!
line vty
!
