router bgp 65001
 no bgp ebgp-requires-policy
 no bgp network import-check
 bgp router-id 10.255.1.1
 neighbor 10.10.9.1 remote-as 65000
 neighbor 10.10.9.1 description EBGP-edge1
 neighbor 10.10.9.5 remote-as 65000
 neighbor 10.10.9.5 description EBGP-edge2
 !
 address-family ipv4 unicast
  network 10.255.1.1/32
  network 172.16.100.0/24
 exit-address-family
exit
