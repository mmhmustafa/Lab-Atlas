! lab=06-atlas-demo  node=edge2  role=edge
! Regenerate with: python3 scripts/generate-configs.py
! ============================================================================
frr version 10.0
frr defaults traditional
hostname edge2
log file /var/log/frr/frr.log informational
log timestamp precision 3
service integrated-vtysh-config
!
interface lo
 description LOOPBACK-edge2
 ip address 10.255.0.2/32
!
interface eth1
 description LINK-TO-ISP1-ISP-EDGE
 ip address 192.0.2.14/30
!
interface eth2
 description LINK-TO-ISP2-ISP-EDGE
 ip address 192.0.2.22/30
!
interface eth3
 description LINK-TO-EDGE1-EDGE-EDGE
 ip address 10.10.1.2/30
!
interface eth4
 description LINK-TO-CORE1-EDGE-CORE
 ip address 10.10.2.9/30
!
interface eth5
 description LINK-TO-CORE2-EDGE-CORE
 ip address 10.10.2.13/30
!
interface eth6
 description LINK-TO-BRANCH1-EDGE-BRANCH
 ip address 10.10.9.5/30
!
interface eth7
 description LINK-TO-BRANCH2-EDGE-BRANCH
 ip address 10.10.9.13/30
!
interface eth8
 description LINK-TO-BRANCH3-EDGE-BRANCH
 ip address 10.10.9.21/30
!
interface eth9
 description LINK-TO-BRANCH4-EDGE-BRANCH
 ip address 10.10.9.29/30
!
router ospf
 ospf router-id 10.255.0.2
 passive-interface default
 no passive-interface eth3
 no passive-interface eth4
 no passive-interface eth5
 network 10.255.0.2/32 area 0.0.0.0
 network 10.10.1.0/30 area 0.0.0.0
 network 10.10.2.8/30 area 0.0.0.0
 network 10.10.2.12/30 area 0.0.0.0
 redistribute bgp
exit
!
route-map RM-OSPF-TO-BGP permit 10
 match route-type internal
exit
!
ip prefix-list PL-ATLAS-LOOPBACKS seq 5 permit 10.255.0.0/24 le 32
ip prefix-list PL-ATLAS-LANS seq 5 permit 172.16.0.0/20 le 24
!
route-map RM-TO-ISP permit 10
 match ip address prefix-list PL-ATLAS-LOOPBACKS
exit
!
route-map RM-TO-ISP permit 20
 match ip address prefix-list PL-ATLAS-LANS
exit
!
router bgp 65000
 no bgp ebgp-requires-policy
 no bgp network import-check
 bgp router-id 10.255.0.2
 neighbor 10.255.0.1 remote-as 65000
 neighbor 10.255.0.1 description IBGP-edge1
 neighbor 10.255.0.1 update-source lo
 neighbor 10.255.0.11 remote-as 65000
 neighbor 10.255.0.11 description IBGP-core1
 neighbor 10.255.0.11 update-source lo
 neighbor 10.255.0.12 remote-as 65000
 neighbor 10.255.0.12 description IBGP-core2
 neighbor 10.255.0.12 update-source lo
 neighbor 192.0.2.13 remote-as 64500
 neighbor 192.0.2.13 description EBGP-isp1
 neighbor 192.0.2.21 remote-as 64501
 neighbor 192.0.2.21 description EBGP-isp2
 neighbor 10.10.9.6 remote-as 65001
 neighbor 10.10.9.6 description EBGP-branch1
 neighbor 10.10.9.14 remote-as 65002
 neighbor 10.10.9.14 description EBGP-branch2
 neighbor 10.10.9.22 remote-as 65003
 neighbor 10.10.9.22 description EBGP-branch3
 neighbor 10.10.9.30 remote-as 65004
 neighbor 10.10.9.30 description EBGP-branch4
 !
 address-family ipv4 unicast
  neighbor 10.255.0.1 next-hop-self
  neighbor 10.255.0.11 next-hop-self
  neighbor 10.255.0.12 next-hop-self
  maximum-paths ibgp 4
  redistribute ospf route-map RM-OSPF-TO-BGP
  neighbor 192.0.2.13 route-map RM-TO-ISP out
  neighbor 192.0.2.21 route-map RM-TO-ISP out
 exit-address-family
exit
!
line vty
!
